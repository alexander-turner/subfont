name: Tests
'on':
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install
      - name: Install Chrome for puppeteer
        run: pnpm exec puppeteer browsers install chrome
      - name: Set PUPPETEER_EXECUTABLE_PATH
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(node -e 'console.log(require("puppeteer").executablePath())')" >> $GITHUB_ENV
      - name: Run tests
        run: |
          pnpm exec mocha --reporter spec 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}
      - name: Save test results
        if: always()
        run: |
          echo '## Test Results' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "passing|failing|Error|AssertionError|✓|✗|×" test-output.txt | tail -100 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install
      - run: pnpm run lint

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install
      - name: Install Chrome for puppeteer
        run: pnpm exec puppeteer browsers install chrome
      - name: Set PUPPETEER_EXECUTABLE_PATH
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(node -e 'console.log(require("puppeteer").executablePath())')" >> $GITHUB_ENV
      - run: pnpm run coverage
      - name: Upload coverage
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [test, lint, coverage]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.lint.result }}" != "success" || "${{ needs.coverage.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All checks passed"
