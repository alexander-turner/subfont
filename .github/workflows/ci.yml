name: Tests
'on':
  push:
    branches:
      - master
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        node:
          - '18'
          - '22'
          - '24'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Chrome for puppeteer
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        run: pnpm exec puppeteer browsers install chrome
      - name: Set PUPPETEER_EXECUTABLE_PATH
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(node -e 'console.log(require("puppeteer").executablePath())')" >> $GITHUB_ENV
      - name: Run tests
        run: |
          set -o pipefail
          pnpm exec mocha --reporter spec 2>&1 | tee test-output.txt
      - name: Save test results
        if: always()
        run: |
          echo '## Test Results — Node ${{ matrix.node }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install
      - run: pnpm run lint

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install
      - name: Cache Puppeteer Chrome
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Chrome for puppeteer
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        run: pnpm exec puppeteer browsers install chrome
      - name: Set PUPPETEER_EXECUTABLE_PATH
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(node -e 'console.log(require("puppeteer").executablePath())')" >> $GITHUB_ENV
      - run: pnpm run coverage
      - name: Check coverage thresholds
        run: pnpm run check-coverage
      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  install-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Install Check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Pack and install as consumer
        run: |
          TARBALL=$(pnpm pack 2>/dev/null | tail -1)
          mkdir /tmp/test-install
          cd /tmp/test-install
          npm init -y
          npm install "$GITHUB_WORKSPACE/$TARBALL"

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test, lint, coverage, install-check]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.lint.result }}" != "success" || "${{ needs.coverage.result }}" != "success" || "${{ needs.install-check.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All checks passed"
