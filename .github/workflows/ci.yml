name: Tests
'on':
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install system dependencies for canvas
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev
      - run: npm install
      - name: Install Chrome for puppeteer
        run: npx puppeteer browsers install chrome
      - name: Set PUPPETEER_EXECUTABLE_PATH
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(node -p 'require(\"puppeteer\").executablePath()')" >> $GITHUB_ENV
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install system dependencies for canvas
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev
      - run: npm install
      - name: Install Chrome for puppeteer
        run: npx puppeteer browsers install chrome
      - name: Set PUPPETEER_EXECUTABLE_PATH
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(node -p 'require(\"puppeteer\").executablePath()')" >> $GITHUB_ENV
      - run: npm run coverage
      - name: Upload coverage
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [test, lint, coverage]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.lint.result }}" != "success" || "${{ needs.coverage.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All checks passed"
